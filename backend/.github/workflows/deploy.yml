name: Deploy Lambda

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::<AWS_ACCOUNT_ID>:role/github-lambda-deploy-role
          aws-region: eu-west-2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci
      - run: npm run build --if-present
      - run: zip -r function.zip . -x ".git/*" ".github/*"

      - uses: aws-actions/aws-lambda-deploy@v1
        with:
          function-name: bookings-node
          code-artifacts-dir: .
          handler: index.handler
          runtime: nodejs22.x