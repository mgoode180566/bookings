name: Deploy to Elastic Beanstalk

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Reinstall production dependencies only
        run: npm ci --omit=dev

      - name: Zip package
        run: zip -r deploy.zip . -x ".git/*" ".github/*" "*.md" "*.test.*" "*.ts"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::982534349843:role/github-lambda-deploy-role
          aws-region: eu-west-2

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ env.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws_session_token: ${{ env.AWS_SESSION_TOKEN }}
          application_name: bookings-api
          environment_name: bookings-prod
          region: eu-west-2
          version_label: ${{ github.sha }}
          deployment_package: deploy.zip


