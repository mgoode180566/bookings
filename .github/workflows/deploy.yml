name: Deploy

on:
  push:
    branches: [master]

permissions:
  id-token: write
  contents: read

jobs:
  deploy-backend:
    name: Deploy Backend to Elastic Beanstalk
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Reinstall production dependencies only
        run: npm ci --omit=dev

      - name: Zip package
        run: zip -r deploy.zip . -x ".git/*" ".github/*" "*.md" "*.test.*" "*.ts" "bookings-ui/*"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::982534349843:role/github-lambda-deploy-role
          aws-region: us-east-1

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        env:
          AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ env.AWS_SESSION_TOKEN }}
        with:
          aws_access_key: ${{ env.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws_session_token: ${{ env.AWS_SESSION_TOKEN }}
          application_name: bookings
          environment_name: bookings-prod
          region: us-east-1
          version_label: ${{ github.sha }}-${{ github.run_number }}
          deployment_package: deploy.zip
          use_existing_version_if_available: true
          wait_for_deployment: false

  deploy-frontend:
    name: Deploy Frontend to Amplify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install UI dependencies
        run: npm ci
        working-directory: bookings-ui

      - name: Build UI
        run: npm run build
        working-directory: bookings-ui

      - name: Zip build output
        run: zip -r ui.zip .
        working-directory: bookings-ui/dist

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::982534349843:role/github-lambda-deploy-role
          aws-region: us-east-1

      - name: Deploy to Amplify
        run: |
          DEPLOYMENT=$(aws amplify create-deployment \
            --app-id ${{ vars.AMPLIFY_APP_ID }} \
            --branch-name master)
          UPLOAD_URL=$(echo $DEPLOYMENT | jq -r '.zipUploadUrl')
          JOB_ID=$(echo $DEPLOYMENT | jq -r '.jobId')
          curl -T bookings-ui/dist/ui.zip "$UPLOAD_URL"
          aws amplify start-deployment \
            --app-id ${{ vars.AMPLIFY_APP_ID }} \
            --branch-name master \
            --job-id $JOB_ID
